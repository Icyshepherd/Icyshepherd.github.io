    <div class="image-lightbox" id="imageLightbox" aria-hidden="true">
        <button class="image-lightbox-close" id="imageLightboxClose" aria-label="Close">x</button>
        <img src="" alt="" id="imageLightboxImg">
    </div>
    <script>
        const lightbox = document.getElementById("imageLightbox");
        const lightboxImg = document.getElementById("imageLightboxImg");
        const lightboxClose = document.getElementById("imageLightboxClose");
        const images = document.querySelectorAll(".img1");

        function closeLightbox() {
            lightbox.classList.remove("is-open");
            lightbox.setAttribute("aria-hidden", "true");
            lightboxImg.src = "";
            lightboxImg.alt = "";
        }

        images.forEach((image) => {
            image.addEventListener("click", () => {
                lightboxImg.src = image.src;
                lightboxImg.alt = image.alt;
                lightbox.classList.add("is-open");
                lightbox.setAttribute("aria-hidden", "false");
            });
        });

        lightboxClose.addEventListener("click", closeLightbox);
        lightbox.addEventListener("click", (event) => {
            if (event.target === lightbox) {
                closeLightbox();
            }
        });
        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
                closeLightbox();
            }
        });
    </script>
